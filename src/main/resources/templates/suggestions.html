<div th:fragment="content" class="fade-in" xmlns:th="http://www.w3.org/1999/xhtml">
    <div class="container mt-4">
        <!-- Header Section -->
        <div class="row mb-4">
            <div class="col-12">
                <div class="d-flex justify-content-between align-items-center flex-wrap">
                    <div>
                        <h2 class="mb-1">
                            <i class="fas fa-lightbulb text-warning me-2"></i>
                            Smart Suggestions
                        </h2>
                        <p class="text-muted mb-0">Personalized tips to optimize your spending</p>
                    </div>
                    <div class="mt-3 mt-md-0">
                        <button class="btn btn-primary btn-sm" onclick="loadSuggestions()">
                            <i class="fas fa-sync-alt me-2"></i>Refresh
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Suggestions Container -->
        <div id="suggestions-container">
            <div class="text-center py-5">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
                <p class="mt-3 text-muted">Analyzing your spending patterns...</p>
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {
    loadSuggestions();
});

function loadSuggestions() {
    const container = document.getElementById('suggestions-container');
    
    // Show loading state
    container.innerHTML = `
        <div class="text-center">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
            <p class="mt-2">Analyzing your expenses...</p>
        </div>
    `;
    
    fetch('/expense/suggestions')
        .then(response => response.json())
        .then(data => {
            displaySuggestions(data);
        })
        .catch(error => {
            console.error('Error loading suggestions:', error);
            container.innerHTML = `
                <div class="alert alert-danger">
                    <i class="fas fa-exclamation-triangle me-2"></i>
                    Error loading suggestions. Please try again.
                </div>
            `;
        });
}

function displaySuggestions(suggestions) {
    const container = document.getElementById('suggestions-container');
    
    if (Object.keys(suggestions).length === 0) {
        container.innerHTML = `
            <div class="alert alert-info">
                <i class="fas fa-info-circle me-2"></i>
                No expense data available yet. Add some expenses to get personalized suggestions!
            </div>
        `;
        return;
    }
    
    let html = '<div class="row g-3">';
    
    for (const [category, suggestion] of Object.entries(suggestions)) {
        const alertClass = getAlertClass(suggestion);
        const icon = getIconClass(suggestion);
        const priority = getPriority(suggestion);
        
        html += `
            <div class="col-12 col-md-6 col-lg-4">
                <div class="card h-100 ${alertClass} suggestion-card" data-category="${category}">
                    <div class="card-body">
                        <div class="d-flex align-items-start mb-3">
                            <div class="me-3">
                                <i class="${icon} fa-2x"></i>
                            </div>
                            <div class="flex-grow-1">
                                <h5 class="card-title mb-1">${capitalizeFirst(category)}</h5>
                                <span class="badge ${priority.badge} mb-2">${priority.label}</span>
                            </div>
                        </div>
                        <p class="card-text small">${suggestion}</p>
                        <div class="mt-3">
                            <button class="btn btn-outline-primary btn-sm w-100" onclick="showCategoryDetails('${category}')">
                                <i class="fas fa-chart-pie me-1"></i>View Details
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        `;
    }
    
    html += '</div>';
    
    // Add mobile-friendly tips section
    html += `
        <div class="row mt-4">
            <div class="col-12">
                <div class="card bg-light">
                    <div class="card-header bg-light">
                        <h6 class="mb-0">
                            <i class="fas fa-lightbulb text-warning me-2"></i>
                            Quick Tips to Reduce Expenses
                        </h6>
                    </div>
                    <div class="card-body">
                        <div class="row g-2">
                            <div class="col-12 col-md-6">
                                <div class="d-flex align-items-start mb-2">
                                    <i class="fas fa-check-circle text-success me-2 mt-1"></i>
                                    <small>Track every expense to identify patterns</small>
                                </div>
                                <div class="d-flex align-items-start mb-2">
                                    <i class="fas fa-check-circle text-success me-2 mt-1"></i>
                                    <small>Set monthly budgets for high-spending categories</small>
                                </div>
                                <div class="d-flex align-items-start mb-2">
                                    <i class="fas fa-check-circle text-success me-2 mt-1"></i>
                                    <small>Compare prices before making purchases</small>
                                </div>
                            </div>
                            <div class="col-12 col-md-6">
                                <div class="d-flex align-items-start mb-2">
                                    <i class="fas fa-check-circle text-success me-2 mt-1"></i>
                                    <small>Look for cheaper alternatives</small>
                                </div>
                                <div class="d-flex align-items-start mb-2">
                                    <i class="fas fa-check-circle text-success me-2 mt-1"></i>
                                    <small>Use cash for discretionary spending</small>
                                </div>
                                <div class="d-flex align-items-start mb-0">
                                    <i class="fas fa-check-circle text-success me-2 mt-1"></i>
                                    <small>Review subscriptions regularly</small>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    `;
    
    container.innerHTML = html;
}

function getAlertClass(suggestion) {
    if (suggestion.includes('high')) return 'border-start border-4 border-danger';
    if (suggestion.includes('significant')) return 'border-start border-4 border-warning';
    return 'border-start border-4 border-success';
}

function getIconClass(suggestion) {
    if (suggestion.includes('high')) return 'fas fa-exclamation-triangle text-danger';
    if (suggestion.includes('significant')) return 'fas fa-exclamation-circle text-warning';
    return 'fas fa-check-circle text-success';
}

function getPriority(suggestion) {
    if (suggestion.includes('high')) {
        return { badge: 'bg-danger', label: 'High Priority' };
    }
    if (suggestion.includes('significant')) {
        return { badge: 'bg-warning', label: 'Medium Priority' };
    }
    return { badge: 'bg-success', label: 'Good Control' };
}

function capitalizeFirst(str) {
    return str.charAt(0).toUpperCase() + str.slice(1);
}

function showCategoryDetails(category) {
    // Placeholder for future category detail view
    console.log('Show details for category:', category);
    // Could open a modal or navigate to detailed view
}

// Add mobile touch interactions
document.addEventListener('DOMContentLoaded', function() {
    if ('ontouchstart' in window) {
        const cards = document.querySelectorAll('.suggestion-card');
        cards.forEach(card => {
            card.addEventListener('touchstart', function() {
                this.style.transform = 'scale(0.98)';
            });
            
            card.addEventListener('touchend', function() {
                this.style.transform = 'scale(1)';
            });
        });
    }
});
</script>
