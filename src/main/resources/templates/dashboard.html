<div th:fragment="content" class="fade-in">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0">Dashboard</h2>
        <div class="d-none d-md-block">
            <span class="badge bg-success" th:if="${balance >= 0}">
                <i class="fas fa-check-circle me-1"></i>Healthy Balance
            </span>
            <span class="badge bg-danger" th:if="${balance < 0}">
                <i class="fas fa-exclamation-triangle me-1"></i>Deficit Alert
            </span>
        </div>
    </div>

    <!-- Summary Cards -->
    <div class="row g-3 mb-4">
        <div class="col-12 col-sm-6 col-lg-4">
            <div class="card text-white bg-success h-100">
                <div class="card-body d-flex flex-column justify-content-between">
                    <div>
                        <h5 class="card-title">
                            <i class="fas fa-arrow-up me-2"></i>Total Income
                        </h5>
                        <h3 class="card-text mb-0" th:text="'$' + ${#numbers.formatDecimal(totalIncome, 0, 2)}">$0.00</h3>
                    </div>
                    <div class="mt-3">
                        <small class="opacity-75">
                            <i class="fas fa-chart-line me-1"></i>All time earnings
                        </small>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-12 col-sm-6 col-lg-4">
            <div class="card text-white bg-danger h-100">
                <div class="card-body d-flex flex-column justify-content-between">
                    <div>
                        <h5 class="card-title">
                            <i class="fas fa-arrow-down me-2"></i>Total Expense
                        </h5>
                        <h3 class="card-text mb-0" th:text="'$' + ${#numbers.formatDecimal(totalExpense, 0, 2)}">$0.00</h3>
                    </div>
                    <div class="mt-3">
                        <small class="opacity-75">
                            <i class="fas fa-shopping-cart me-1"></i>All time spending
                        </small>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-12 col-sm-12 col-lg-4">
            <div class="card text-white h-100" 
                 th:classappend="${balance >= 0} ? 'bg-primary' : 'bg-warning'">
                <div class="card-body d-flex flex-column justify-content-between">
                    <div>
                        <h5 class="card-title">
                            <i class="fas fa-wallet me-2"></i>Balance
                        </h5>
                        <h3 class="card-text mb-0" th:text="'$' + ${#numbers.formatDecimal(balance, 0, 2)}">$0.00</h3>
                    </div>
                    <div class="mt-3">
                        <small class="opacity-75">
                            <i class="fas fa-balance-scale me-1"></i>
                            <span th:if="${balance >= 0}">Positive balance</span>
                            <span th:if="${balance < 0}">Negative balance</span>
                        </small>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Charts Section -->
    <div class="row g-3">
        <div class="col-12 col-lg-6">
            <div class="card h-100">
                <div class="card-header bg-light">
                    <h6 class="mb-0">
                        <i class="fas fa-chart-pie me-2"></i>Income vs Expense
                    </h6>
                </div>
                <div class="card-body p-3">
                    <div class="chart-container" style="position: relative; height: 300px;">
                        <canvas id="pieChart"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-12 col-lg-6">
            <div class="card h-100">
                <div class="card-header bg-light">
                    <h6 class="mb-0">
                        <i class="fas fa-chart-bar me-2"></i>Financial Overview
                    </h6>
                </div>
                <div class="card-body p-3">
                    <div class="chart-container" style="position: relative; height: 300px;">
                        <canvas id="barChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Mobile Status Badge -->
    <div class="d-md-none mt-4">
        <div class="alert" th:classappend="${balance >= 0} ? 'alert-success' : 'alert-warning'">
            <div class="d-flex align-items-center">
                <i class="fas fa-info-circle me-2"></i>
                <div>
                    <strong>Financial Status:</strong>
                    <span th:if="${balance >= 0}"> Your balance is positive!</span>
                    <span th:if="${balance < 0}"> You're running a deficit.</span>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {
    const totalIncome = [[${totalIncome}]];
    const totalExpense = [[${totalExpense}]];

    // Chart configuration for responsive design
    const chartOptions = {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
            legend: {
                position: window.innerWidth < 768 ? 'bottom' : 'top',
                labels: {
                    padding: window.innerWidth < 768 ? 10 : 20,
                    font: {
                        size: window.innerWidth < 768 ? 12 : 14
                    }
                }
            },
            tooltip: {
                callbacks: {
                    label: function(context) {
                        let label = context.label || '';
                        if (label) {
                            label += ': ';
                        }
                        label += '$' + context.parsed.toFixed(2);
                        return label;
                    }
                }
            }
        }
    };

    // Pie Chart
    new Chart(document.getElementById("pieChart"), {
        type: "pie",
        data: {
            labels: ["Income", "Expense"],
            datasets: [{
                data: [totalIncome, totalExpense],
                backgroundColor: ["#198754", "#dc3545"],
                borderWidth: 2,
                borderColor: '#fff'
            }]
        },
        options: {
            ...chartOptions,
            plugins: {
                ...chartOptions.plugins,
                legend: {
                    ...chartOptions.plugins.legend,
                    position: window.innerWidth < 768 ? 'bottom' : 'right'
                }
            }
        }
    });

    // Bar Chart
    new Chart(document.getElementById("barChart"), {
        type: "bar",
        data: {
            labels: ["Income", "Expense"],
            datasets: [{
                label: "Amount",
                data: [totalIncome, totalExpense],
                backgroundColor: ["#198754", "#dc3545"],
                borderColor: ["#157347", "#bb2d3b"],
                borderWidth: 2,
                borderRadius: 8
            }]
        },
        options: {
            ...chartOptions,
            scales: {
                y: {
                    beginAtZero: true,
                    ticks: {
                        callback: function(value) {
                            return '$' + value.toFixed(0);
                        }
                    }
                }
            },
            plugins: {
                ...chartOptions.plugins,
                legend: {
                    display: false
                }
            }
        }
    });

    // Handle window resize for charts
    window.addEventListener('resize', function() {
        Chart.helpers.each(Chart.instances, function(instance) {
            instance.resize();
        });
    });
});
</script>
